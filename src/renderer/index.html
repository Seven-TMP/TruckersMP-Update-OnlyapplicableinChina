<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMP更新工具</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-wrapper">
        <!-- 窗口标题栏 -->
        <div class="window-titlebar">
            <div class="window-title">
                <span class="app-name">TMP更新工具</span>
                <span class="version-badge" id="appVersion">v1.0</span>
            </div>
            <div class="window-controls">
                <button class="control-btn" id="btnMinimize" title="最小化">
                    <svg viewBox="0 0 12 12"><rect y="5" width="12" height="1.5" fill="currentColor"/></svg>
                </button>
                <button class="control-btn" id="btnMaximize" title="最大化">
                    <svg viewBox="0 0 12 12"><rect x="1.5" y="1.5" width="9" height="9" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
                </button>
                <button class="control-btn close" id="btnClose" title="关闭">
                    <svg viewBox="0 0 12 12"><path d="M1 1L11 11M11 1L1 11" stroke="currentColor" stroke-width="1.5"/></svg>
                </button>
            </div>
        </div>

        <div class="main-content">
            <!-- 头部 -->
            <div class="app-header">
                <h1>TMP更新工具</h1>
                <p class="subtitle">更新 TruckersMP 插件文件</p>
                <div class="divider"></div>
            </div>

            <!-- 目录设置卡片 -->
            <div class="card slide-up">
                <div class="card-header">
                    <div class="card-title">
                        <span class="icon">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
                            </svg>
                        </span>
                        目录设置
                    </div>
                    <div class="status-indicator" id="appStatus">
                        <span class="status-dot idle"></span>
                        <span>就绪</span>
                    </div>
                </div>

                <div class="alert-box alert-info">
                    <span class="alert-icon">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M12 16v-4M12 8h.01"/>
                        </svg>
                    </span>
                    <div>
                        <strong>使用说明</strong><br/>
                        • 先获取文件列表<br/>
                        • 旧版目录需要管理员权限<br/>
                        • 分别更新新版和旧版文件<br/>
                    </div>
                </div>

                <div class="directory-section">
                    <div class="directory-item">
                        <div class="directory-label">
                            <span>新版目录（用户目录）</span>
                            <span class="badge new">推荐</span>
                        </div>
                        <div class="directory-input-group">
                            <input
                                type="text"
                                id="newDirInput"
                                value=""
                                placeholder="将自动检测 TMP 目录路径"
                                readonly
                            />
                            <button class="btn-select" onclick="selectDirectory('new')">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
                                </svg>
                                选择
                            </button>
                        </div>
                    </div>

                    <div class="directory-item">
                        <div class="directory-label">
                            <span>旧版目录（系统目录）</span>
                            <span class="badge old">需管理员</span>
                        </div>
                        <div class="directory-input-group">
                            <input
                                type="text"
                                id="oldDirInput"
                                value="C:\ProgramData\TruckersMP"
                                placeholder="请输入旧版目录路径"
                            />
                            <button class="btn-select" onclick="selectDirectory('old')">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
                                </svg>
                                选择
                            </button>
                        </div>
                    </div>
                </div>

                <div class="action-buttons">
                    <button class="btn-action btn-primary" id="btnGetFiles">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                            <polyline points="14,2 14,8 20,8"/>
                            <line x1="16" y1="13" x2="8" y2="13"/>
                            <line x1="16" y1="17" x2="8" y2="17"/>
                        </svg>
                        获取文件列表
                    </button>

                    <button class="btn-action btn-secondary" id="btnCheckPerm">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0110 0v4"/>
                        </svg>
                        检查权限
                    </button>

                    <button class="btn-action btn-success" id="btnUpdateNew">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                            <polyline points="7,10 12,15 17,10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        更新新版
                    </button>

                    <button class="btn-action btn-warning" id="btnUpdateOld">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="23,4 23,10 17,10"/>
                            <path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/>
                        </svg>
                        更新旧版
                    </button>

                    <button class="btn-action btn-info" id="btnQuickUpdate">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polygon points="13,2 3,14 12,14 11,22 21,10 12,10 13,2"/>
                        </svg>
                        一键更新
                    </button>
                </div>
            </div>

            <!-- 状态提示 -->
            <div id="statusMessage" class="alert-box" style="display: none;"></div>

            <!-- 进度条 -->
            <div id="progressSection" class="card progress-section" style="display: none;">
                <div class="progress-header">
                    <span class="title">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="20" x2="12" y2="10"/>
                            <line x1="18" y1="20" x2="18" y2="4"/>
                            <line x1="6" y1="20" x2="6" y2="16"/>
                        </svg>
                        更新进度
                    </span>
                    <span class="percent" id="progressPercent">0%</span>
                </div>
                <div id="currentFile" class="progress-status"></div>
                <div class="progress-bar-container">
                    <div class="progress-bar-fill" id="progressBar" style="width: 0%"></div>
                </div>
            </div>

            <!-- 文件列表 -->
            <div id="fileListSection" class="file-list-section" style="display: none;">
                <div class="file-list-header">
                    <div class="card-title">
                        <span class="icon">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
                            </svg>
                        </span>
                        文件列表
                    </div>
                    <span class="file-count" id="fileCount">0 个文件</span>
                </div>

                <div id="fileListContainer" class="file-list-container">
                    <!-- 文件列表将在这里动态生成 -->
                </div>
            </div>
        </div>

        <!-- 底部版权 -->
        <div class="app-footer">
            <div class="footer-content">
                <div class="author">作者:Seven_TMP</div>
                <div class="thanks">特别鸣谢：备长炭提供接口</div>
            </div>
        </div>
    </div>

    <!-- 引入主应用脚本 -->
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
