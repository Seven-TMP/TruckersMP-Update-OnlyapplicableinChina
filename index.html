<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMP更新工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        
        .app-wrapper {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        /* 窗口控制栏 */
        .window-titlebar {
            -webkit-app-region: drag;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: rgba(0,0,0,0.15);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .window-title {
            color: white;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .window-controls {
            -webkit-app-region: no-drag;
            display: flex;
            gap: 4px;
        }
        
        .control-btn {
            width: 32px;
            height: 28px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 14px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }
        
        .control-btn:hover {
            background: rgba(255,255,255,0.25);
        }
        
        .control-btn.close:hover {
            background: #e81123;
        }
        
        /* 主内容区 */
        .main-content {
            flex: 1;
            max-width: 1100px;
            margin: 0 auto;
            padding: 25px;
            width: 100%;
        }
        
        /* 头部 */
        .app-header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .app-header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .app-header p {
            font-size: 1rem;
            opacity: 0.9;
        }
        
        /* 卡片样式 */
        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12);
        }
        
        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: #1a1a2e;
        }
        
        /* 目录输入区域 */
        .directory-section {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .directory-item {
            background: #f8f9fa;
            padding: 18px;
            border-radius: 12px;
            border: 1px solid #e9ecef;
        }
        
        .directory-label {
            font-size: 0.85rem;
            color: #6c757d;
            margin-bottom: 10px;
            font-weight: 500;
        }
        
        .directory-input-group {
            display: flex;
            gap: 10px;
        }
        
        .directory-input-group input {
            flex: 1;
            padding: 10px 14px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 0.9rem;
        }
        
        .btn-select {
            padding: 10px 18px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
        }
        
        /* 功能按钮区 */
        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 20px;
        }
        
        .btn-action {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .btn-success {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
        }
        
        .btn-warning {
            background: linear-gradient(135deg, #fd7e14, #e83e8c);
            color: white;
        }
        
        .btn-action:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        /* 进度区域 */
        .progress-section {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
        }
        
        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .progress-bar-container {
            background: #e9ecef;
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
        }
        
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 5px;
            transition: width 0.3s ease;
        }
        
        /* 提示框 */
        .alert-box {
            padding: 14px 18px;
            border-radius: 10px;
            margin: 15px 0;
            font-size: 0.9rem;
        }
        
        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .alert-warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }
        
        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        /* 底部版权 */
        .app-footer {
            text-align: center;
            padding: 18px;
            color: white;
            font-size: 0.85rem;
            background: rgba(0,0,0,0.1);
            line-height: 1.8;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .main-content {
                padding: 15px;
            }
            
            .app-header h1 {
                font-size: 1.6rem;
            }
            
            .action-buttons {
                flex-direction: column;
            }
            
            .btn-action {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <!-- 窗口标题栏 -->
        <div class="window-titlebar">
            <div class="window-title">
                <span>TMP更新工具</span>
            </div>
            <div class="window-controls">
                <button class="control-btn" onclick="minimizeWindow()">─</button>
                <button class="control-btn close" onclick="closeWindow()">✕</button>
            </div>
        </div>
        
        <div class="main-content">
            <!-- 头部 -->
            <div class="app-header">
                <h1>TMP更新工具</h1>
                <p>代理更新TruckersMP插件文件</p>
            </div>

            <!-- 目录设置卡片 -->
            <div class="card">
                <div class="card-title">📁 目录设置</div>
                
                <div class="alert-box alert-info">
                    <strong>💡 使用说明：</strong><br/>
                    • 先获取文件列表<br/>
                    • 旧版目录需要管理员权限<br/>
                    • 分别更新新版和旧版文件<br/>
                </div>
                
                <div class="directory-section">
                    <div class="directory-item">
                        <div class="directory-label">新版目录（用户目录）</div>
                        <div class="directory-input-group">
                            <input 
                                type="text" 
                                id="newDirInput"
                                value="C:\Users\Administrator\AppData\Roaming\TruckersMP\installation"
                                placeholder="请输入新版目录路径"
                            />
                            <button class="btn-select" onclick="selectDirectory('new')">
                                选择
                            </button>
                        </div>
                    </div>
                    
                    <div class="directory-item">
                        <div class="directory-label">旧版目录（系统目录 - 需要管理员权限）</div>
                        <div class="directory-input-group">
                            <input 
                                type="text" 
                                id="oldDirInput"
                                value="C:\ProgramData\TruckersMP"
                                placeholder="请输入旧版目录路径"
                            />
                            <button class="btn-select" onclick="selectDirectory('old')">
                                选择
                            </button>
                        </div>
                    </div>
                </div>

                <div class="action-buttons">
                    <button class="btn-action btn-primary" onclick="getFiles()" id="btnGetFiles">
                        <span style="font-size:1.1em">📋</span> 获取文件列表
                    </button>
                    
                    <button class="btn-action btn-secondary" onclick="checkPermissions()" id="btnCheckPerm">
                        🔒 检查权限
                    </button>
                    
                    <button class="btn-action btn-success" onclick="updateFiles('new')" id="btnUpdateNew">
                        🆕 更新新版
                    </button>
                    
                    <button class="btn-action btn-warning" onclick="updateFiles('old')" id="btnUpdateOld">
                        🔄 更新旧版
                    </button>
                </div>
            </div>

            <!-- 状态提示 -->
            <div id="statusMessage" class="alert-box" style="display: none;"></div>

            <!-- 进度条 -->
            <div id="progressSection" class="card progress-section" style="display: none;">
                <div class="progress-header">
                    <span>📊 更新进度</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div id="currentFile" style="margin-bottom: 10px; color: #6c757d; font-size: 0.9rem;"></div>
                <div class="progress-bar-container">
                    <div class="progress-bar-fill" id="progressBar" style="width: 0%"></div>
                </div>
            </div>
            
            <!-- 文件列表 -->
            <div id="fileListSection" class="card" style="display: none;">
                <div class="card-title">
                    📁 文件列表 
                    <span style="background: #667eea; color: white; padding: 4px 12px; border-radius: 12px; font-size: 0.8rem;" id="fileCount">0 个文件</span>
                </div>
                
                <div id="fileListContainer" style="max-height: 300px; overflow-y: auto;">
                    <!-- 文件列表将在这里动态生成 -->
                </div>
            </div>
        </div>
        
        <!-- 底部版权 -->
        <div class="app-footer">
            <div>作者: Seven_TMP</div>
            <div>特别鸣谢: 长碳提供接口</div>
        </div>
    </div>

    <script>
        let fileList = [];
        let updating = false;

        // 窗口控制函数
        function minimizeWindow() {
            if (window.electron && window.electron.ipcRenderer) {
                window.electron.ipcRenderer.send('minimize-window');
            }
        }

        function closeWindow() {
            if (window.electron && window.electron.ipcRenderer) {
                window.electron.ipcRenderer.send('close-window');
            }
        }

        // 设置状态消息
        function setStatusMessage(message, type = 'info') {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.innerHTML = message.replace(/\n/g, '<br>');
            statusDiv.className = `alert-box alert-${type}`;
            statusDiv.style.display = 'block';
        }

        // 显示/隐藏进度条
        function showProgress(show) {
            document.getElementById('progressSection').style.display = show ? 'block' : 'none';
        }

        // 更新进度
        function updateProgress(percent, currentFile = '') {
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('progressPercent').textContent = percent + '%';
            document.getElementById('currentFile').textContent = currentFile ? '当前文件: ' + currentFile : '';
        }

        // 选择目录
        async function selectDirectory(type) {
            try {
                const path = await window.electronAPI.selectDirectory();
                if (path) {
                    const inputId = type === 'new' ? 'newDirInput' : 'oldDirInput';
                    document.getElementById(inputId).value = path;
                    setStatusMessage(`已选择目录: ${path}`, 'success');
                }
            } catch (error) {
                setStatusMessage('选择目录失败: ' + error.message, 'error');
            }
        }

        // 获取文件列表
        async function getFiles() {
            if (updating) return;
            updating = true;
            setButtonState(true);
            
            try {
                setStatusMessage('正在获取文件列表...', 'info');
                fileList = await window.electronAPI.getFileList();
                displayFileList();
                setStatusMessage(`成功获取 ${fileList.length} 个文件`, 'success');
            } catch (error) {
                setStatusMessage(error.message, 'error');
            } finally {
                updating = false;
                setButtonState(false);
            }
        }

        // 检查权限
        async function checkPermissions() {
            if (updating) return;
            updating = true;
            setButtonState(true);
            
            try {
                setStatusMessage('检查新版目录权限...', 'info');
                const newDir = document.getElementById('newDirInput').value;
                const newPerm = await window.electronAPI.checkPermission(newDir);
                
                setStatusMessage('检查旧版目录权限...', 'info');
                const oldDir = document.getElementById('oldDirInput').value;
                const oldPerm = await window.electronAPI.checkPermission(oldDir);
                
                let message = '权限检查完成！<br>';
                message += `新版目录: ${newPerm.hasPermission ? '✅ 有权限' : '❌ 无权限'}<br>`;
                message += `旧版目录: ${oldPerm.hasPermission ? '✅ 有权限' : '❌ 无权限'}`;
                
                if (!oldPerm.hasPermission) {
                    message += '<br><br>旧版目录需要管理员权限！';
                }
                
                setStatusMessage(message, oldPerm.hasPermission ? 'success' : 'warning');
            } catch (error) {
                setStatusMessage('权限检查失败: ' + error.message, 'error');
            } finally {
                updating = false;
                setButtonState(false);
            }
        }

        // 更新文件
        async function updateFiles(versionType) {
            if (updating || fileList.length === 0) return;
            
            const targetDir = versionType === 'new' ? 
                document.getElementById('newDirInput').value : 
                document.getElementById('oldDirInput').value;
            
            const versionName = versionType === 'new' ? '新版' : '旧版';
            
            updating = true;
            setButtonState(true);
            showProgress(true);
            updateProgress(0);
            
            try {
                // 过滤需要更新的文件
                const filesToUpdate = fileList.filter(file => 
                    versionType === 'new' ? !file.filePath.includes('core') : file.filePath.includes('core')
                );
                
                if (filesToUpdate.length === 0) {
                    setStatusMessage(`${versionName}目录没有需要更新的文件`, 'info');
                    return;
                }
                
                setStatusMessage(`开始更新${versionName}，共 ${filesToUpdate.length} 个文件...`, 'info');
                
                let successCount = 0;
                let errorCount = 0;
                
                for (let i = 0; i < filesToUpdate.length; i++) {
                    const file = filesToUpdate[i];
                    const progress = Math.round(((i + 1) / filesToUpdate.length) * 100);
                    
                    updateProgress(progress, file.filePath);
                    
                    try {
                        await window.electronAPI.downloadFile(file.downloadUrl, file.filePath, targetDir);
                        successCount++;
                    } catch (error) {
                        errorCount++;
                        console.error(`更新失败: ${file.filePath}`, error);
                    }
                }
                
                const message = `${versionName}更新完成！成功: ${successCount}, 失败: ${errorCount}`;
                setStatusMessage(message, errorCount === 0 ? 'success' : 'warning');
                
            } catch (error) {
                setStatusMessage('更新失败: ' + error.message, 'error');
            } finally {
                updating = false;
                setButtonState(false);
                showProgress(false);
            }
        }

        // 显示文件列表
        function displayFileList() {
            const container = document.getElementById('fileListContainer');
            const countElement = document.getElementById('fileCount');
            const section = document.getElementById('fileListSection');
            
            container.innerHTML = '';
            countElement.textContent = fileList.length + ' 个文件';
            
            fileList.slice(0, 30).forEach(file => {
                const fileItem = document.createElement('div');
                fileItem.style.cssText = 'display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #f1f3f5;';
                
                const fileName = document.createElement('span');
                fileName.textContent = file.filePath;
                fileName.style.cssText = 'font-size: 0.9rem; color: #495057; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;';
                
                const fileType = document.createElement('span');
                fileType.textContent = file.filePath.includes('core') ? '旧版' : '新版';
                fileType.style.cssText = file.filePath.includes('core') ? 
                    'background: #fd7e14; color: white; padding: 2px 8px; border-radius: 8px; font-size: 0.7rem;' : 
                    'background: #28a745; color: white; padding: 2px 8px; border-radius: 8px; font-size: 0.7rem;';
                
                fileItem.appendChild(fileName);
                fileItem.appendChild(fileType);
                container.appendChild(fileItem);
            });
            
            if (fileList.length > 30) {
                const moreText = document.createElement('div');
                moreText.textContent = `还有 ${fileList.length - 30} 个文件...`;
                moreText.style.cssText = 'padding: 12px; text-align: center; color: #6c757d;';
                container.appendChild(moreText);
            }
            
            section.style.display = 'block';
        }

        // 设置按钮状态
        function setButtonState(disabled) {
            const buttons = ['btnGetFiles', 'btnCheckPerm', 'btnUpdateNew', 'btnUpdateOld'];
            buttons.forEach(btnId => {
                const btn = document.getElementById(btnId);
                if (btn) btn.disabled = disabled;
            });
        }

        // 初始化进度监听
        if (window.electronAPI) {
            window.electronAPI.onDownloadProgress((data) => {
                updateProgress(data.progress, data.filePath);
            });
        }
    </script>
</body>
</html>
